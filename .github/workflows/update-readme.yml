name: Update README with Latest YouTube Video

on:
  schedule:
    - cron: "30 1 * * *"  # Runs every day at 01:30 UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Fetch Latest YouTube Video
        run: |
          FEED_XML=$(curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UCy338aNvMsAaWKwXrctaYdw")

          LATEST_VIDEO=$(printf '%s' "$FEED_XML" | grep -oPm1 "(?<=<yt:videoId>)[^<]+" || true)

          # Fallback: some feeds expose the video ID only inside <id>yt:video:...<\/id>
          if [ -z "$LATEST_VIDEO" ]; then
            LATEST_VIDEO=$(printf '%s' "$FEED_XML" | grep -oPm1 "(?<=<id>yt:video:)[^<]+" || true)
          fi

          if [ -z "$LATEST_VIDEO" ] || ! printf '%s' "$LATEST_VIDEO" | grep -Eq '^[A-Za-z0-9_-]{11}$'; then
            echo "Could not parse latest video ID from YouTube feed. Skipping README update."
            exit 0
          fi
          
          echo "Latest Video ID: $LATEST_VIDEO"

          # Replace the video ID in README.md
          sed -i "s|https://img.youtube.com/vi/[^/]*/maxresdefault.jpg|https://img.youtube.com/vi/$LATEST_VIDEO/maxresdefault.jpg|g" README.md
          sed -i "s|https://www.youtube.com/watch?v=[^)]*|https://www.youtube.com/watch?v=$LATEST_VIDEO|g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Updated README with latest YouTube video" || echo "No changes to commit"
          git push
